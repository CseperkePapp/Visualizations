function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function ease(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function hexA(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}

// ---- sizing -----------------------------------------------------------------

  canvas.width = Math.round(W * DPR);

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0); // draw in CSS pixels; DPR handled here
  build();   // rebuild scene to fit new size
  if (paused || reduceMotion) draw(0); // repaint a static frame when not animating
}

function draw(t){
  ctx.clearRect(0, 0, W, H);
  // TODO: render the scene. Map every visual element to the spec's metaphor table.
  // Demo placeholder so the file runs as-is — delete it:
  ctx.fillStyle = '#3a4a63';
  const r = 24 + (reduceMotion ? 0 : 8 * Math.sin(t / 600));

  ctx.arc(W/2 + (mx>-999 ? (mx-W/2)*0.2 : 0), H/2, r, 0, Math.PI*2);

// ---- animation loop (pauses when hidden or paused) --------------------------
let paused = false;
let rafId = null;
let last = 0;

function frame(now){
  rafId = null;
  const dt = last ? Math.min((now - last) / 1000, 0.05) : 0; // clamp big gaps
  last = now;
  if (!reduceMotion) update(dt);
  draw(now);
  if (!paused && !reduceMotion) schedule();
}
function schedule(){ if (rafId == null) rafId = requestAnimationFrame(frame); }
function stop(){ if (rafId != null){ cancelAnimationFrame(rafId); rafId = null; } last = 0; }

// pause when the tab is hidden (saves battery, honors quality bar)
document.addEventListener('visibilitychange', () => {
  if (document.hidden) stop();
  else if (!paused && !reduceMotion) schedule();
});

// ---- controls ---------------------------------------------------------------
const pauseBtn = document.getElementById('pause');
pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.classList.toggle('on', paused);
  pauseBtn.setAttribute('aria-pressed', String(paused));
  pauseBtn.textContent = paused ? 'Play' : 'Pause';
  if (paused) stop(); else schedule();
});
document.getElementById('replay').addEventListener('click', () => {
  build();
  if (paused || reduceMotion) draw(0); else { stop(); schedule(); }
});

canvas.addEventListener('pointermove', e => {
  const rect = canvas.getBoundingClientRect();
  mx = e.clientX - rect.left;
  my = e.clientY - rect.top;
});
canvas.addEventListener('pointerleave', () => { mx = my = -999; });

window.addEventListener('resize', resize);

// ---- boot -------------------------------------------------------------------
resize();
if (reduceMotion) draw(0); else schedule(); // static frame for reduced-motion users
